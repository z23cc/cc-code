[project]
name = "cc-code"
version = "3.8.1"
description = "Development workflow toolkit for Claude Code"
requires-python = ">=3.9"
license = "MIT"

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.14", "mypy>=1.10"]

[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
