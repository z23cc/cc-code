name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Lint
        run: ruff check scripts/ tests/

      - name: Unit tests (fast)
        run: python -m pytest tests/test_helpers.py -v

      - name: Integration tests
        run: python -m pytest tests/test_cc_flow.py -v

      - name: Verify cc-flow CLI
        run: |
          pip install -e .
          cc-flow version
          cc-flow doctor --format json

      - name: Verify compilation
        run: |
          for f in scripts/cc_flow/*.py; do python -m py_compile "$f"; done
          python -m py_compile scripts/morph_client.py
